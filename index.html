<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cadastro de Emergência</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="top">
      <h1>Cadastro de Emergência</h1>
      <div class="divider"></div>
    </header>

    <form id="form" class="card" novalidate>
      <section class="panel">
        <div class="panel__tag">Dados Pessoais</div>

        <div class="field">
          <label for="nome">Nome Completo do Paciente <span class="req">*</span></label>
          <input id="nome" name="nome" type="text" autocomplete="name" required placeholder="Ex: Maria Aparecida Silva" aria-describedby="err-nome" />
          <div class="error" id="err-nome" role="alert" aria-live="polite"></div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="idade">Idade <span class="req">*</span></label>
            <input id="idade" name="idade" type="number" inputmode="numeric" min="0" max="130" required placeholder="Ex: 42" aria-describedby="err-idade" />
            <div class="error" id="err-idade" role="alert" aria-live="polite"></div>
          </div>

          <div class="field">
            <label for="cpf">CPF do Paciente <span class="req">*</span></label>
            <input id="cpf" name="cpf" type="text" inputmode="numeric" maxlength="14" required placeholder="000.000.000-00" aria-describedby="err-cpf" />
            <div class="error" id="err-cpf" role="alert" aria-live="polite"></div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel__tag">Contato de Emergência</div>

        <div class="field">
          <label for="contatoNome">Nome do Responsável <span class="req">*</span></label>
          <input id="contatoNome" name="contatoNome" type="text" required placeholder="Ex: João Silva" aria-describedby="err-contatoNome" />
          <div class="error" id="err-contatoNome" role="alert" aria-live="polite"></div>
        </div>

        <div class="field">
          <label for="telefone">Telefone de Contato <span class="req">*</span></label>
          <input id="telefone" name="telefone" type="text" inputmode="numeric" maxlength="15" required placeholder="(00) 00000-0000" aria-describedby="err-telefone" />
          <div class="error" id="err-telefone" role="alert" aria-live="polite"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel__tag">Triagem Inicial</div>

        <div class="field">
          <label for="queixa">Sintomas Iniciais / Queixa Principal <span class="req">*</span></label>
          <textarea id="queixa" name="queixa" rows="5" required placeholder="Descreva em uma frase objetiva..." aria-describedby="err-queixa"></textarea>
          <div class="error" id="err-queixa" role="alert" aria-live="polite"></div>
        </div>
      </section>

      <details class="disclosure">
        <summary>+ Adicionar histórico médico pregresso (Opcional)</summary>
        <div class="disclosure__body">
          <div class="grid-2">
            <div class="field">
              <label for="alergias">Alergias</label>
              <input id="alergias" name="alergias" type="text" placeholder="Ex: dipirona" />
            </div>
            <div class="field">
              <label for="medicacoes">Medicações em uso</label>
              <input id="medicacoes" name="medicacoes" type="text" placeholder="Ex: losartana" />
            </div>
          </div>
          <div class="field">
            <label for="comorbidades">Comorbidades</label>
            <input id="comorbidades" name="comorbidades" type="text" placeholder="Ex: diabetes, hipertensão" />
          </div>
        </div>
      </details>

      <button type="submit" class="btn-primary">Confirmar Admissão de Emergência</button>
      <button type="button" class="btn-link" id="limpar">Limpar</button>

      <div class="status" id="status" role="status" aria-live="polite"></div>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
